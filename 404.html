    <!-- Routing fallback for static hosts: /login and legacy /fo/ URLs are
         redirected. All other unknown paths show the branded 404 page below. -->
    <script>
    (function () {
        var path = window.location.pathname;
        if (path === '/login') {
            window.location.replace('https://usable.dev/login');
            return;
        }
        if (path === '/fo' || path.startsWith('/fo/')) {
            localStorage.setItem('usable-lang', 'fo');
            var realPath = path.replace(/^\/fo/, '') || '/';
            window.location.replace(realPath);
            return;
        }
    })();
    </script>
